version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: genzura-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: genzura_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: genzura-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/genzura_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_here}
      NODE_ENV: production
    depends_on:
      - db

volumes:
  postgres_data:
